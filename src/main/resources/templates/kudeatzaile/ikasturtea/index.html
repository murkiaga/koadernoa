<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ikasturteak</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/kudeatzaile-common.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .btn-loading {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
        }

        .btn-loading .spinner {
            width: 1rem;
            height: 1rem;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            display: none;
            animation: spin .75s linear infinite;
        }

        .btn-loading.is-loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

</head>
<body>
	<div th:replace="kudeatzaile/fragments/navbar :: kudeatzaile-navbar"></div>
	<main class="page">
	    <h1>Ikasturteak</h1>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
	    <a class="btn btn-primary" th:href="@{/kudeatzaile/ikasturteak/sortu}">Ikasturte berria sortu</a>
	    <ul class="link-list">
	        <li th:each="ikasturtea : ${ikasturteak}" 
	    			th:classappend="${ikasturtea.aktiboa} ? 'is-active'">
                <div style="display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;">
	                <a th:href="@{'/kudeatzaile/ikasturteak/' + ${ikasturtea.id}}">
	                    <span th:text="${ikasturtea.izena}">2024-2025</span>
	                    <span th:if="${ikasturtea.aktiboa}" style="color: green;"> (aktiboa)</span>
	                </a>
                    <form th:if="${ikasturtea.aktiboa}"
                          th:action="@{|/kudeatzaile/ikasturteak/${ikasturtea.id}/koadernoak/sortu-faltan|}"
                          method="post"
                          style="display:inline-block;margin:0;"
                          onsubmit="return erakutsiKoadernoSorreraKarga(this);">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-secondary btn-loading">
                            <span class="spinner" aria-hidden="true"></span>
                            <span class="btn-text">Ikasturte aktiboko falta diren koadernoak sortu</span>
                        </button>
                    </form>
                    <a th:if="${ikasturtea.aktiboa}"
                       class="btn btn-primary"
                       th:href="@{/kudeatzaile/ordutegiak/inportatu(ikasturteaId=${ikasturtea.id})}">
                        Ordutegiak inportatu
                    </a>
                </div>
	        </li>
	    </ul>
    </main>
<script th:src="@{/js/kudeatzaile-nav.js}"></script>
<script>
    function erakutsiKoadernoSorreraKarga(form) {
        if (!confirm('Ziur zaude ikasturte aktiboko falta diren koadernoak sortu nahi dituzula?')) {
            return false;
        }

        const button = form.querySelector('button[type="submit"]');
        if (button) {
            button.disabled = true;
            button.classList.add('is-loading');
            const text = button.querySelector('.btn-text');
            if (text) {
                text.textContent = 'Koadernoak sortzen eta estatistikak eguneratzen...';
            }
        }

        return true;
    }
</script>
</body>
</html>
