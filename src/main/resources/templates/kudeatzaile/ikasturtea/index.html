<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ikasturteak</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/kudeatzaile-common.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
	<div th:replace="kudeatzaile/fragments/navbar :: kudeatzaile-navbar"></div>
	<main class="page">
	    <h1>Ikasturteak</h1>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
	    <a class="btn btn-primary" th:href="@{/kudeatzaile/ikasturteak/sortu}">Ikasturte berria sortu</a>
	    <ul class="link-list">
	        <li th:each="ikasturtea : ${ikasturteak}" 
	    			th:classappend="${ikasturtea.aktiboa} ? 'is-active'">
                <div style="display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;">
	                <a th:href="@{'/kudeatzaile/ikasturteak/' + ${ikasturtea.id}}">
	                    <span th:text="${ikasturtea.izena}">2024-2025</span>
	                    <span th:if="${ikasturtea.aktiboa}" style="color: green;"> (aktiboa)</span>
	                </a>
                    <form th:if="${ikasturtea.aktiboa}"
                          th:action="@{|/kudeatzaile/ikasturteak/${ikasturtea.id}/koadernoak/sortu-faltan|}"
                          method="post"
                          style="display:inline-block;margin:0;"
                          onsubmit="return confirm('Ziur zaude ikasturte aktiboko falta diren koadernoak sortu nahi dituzula?');">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-secondary">Ikasturte aktiboko falta diren koadernoak sortu</button>
                    </form>
                    <a th:if="${ikasturtea.aktiboa}"
                       class="btn btn-primary"
                       th:href="@{/kudeatzaile/ordutegiak/inportatu(ikasturteaId=${ikasturtea.id})}">
                        Ordutegiak inportatu
                    </a>
                </div>
	        </li>
	    </ul>
    </main>
<script th:src="@{/js/kudeatzaile-nav.js}"></script>
</body>
</html>
