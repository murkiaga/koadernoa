<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eu">
<head>
  <meta charset="UTF-8">
  <title>Mezuak</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/kudeatzaile-common.css}">
  <style>
    .table-wrap{margin-top:14px;overflow:auto}
    .message-body{white-space:pre-wrap;max-width:580px}
  </style>
</head>
<body>
<div th:replace="kudeatzaile/fragments/navbar :: kudeatzaile-navbar"></div>
<main style="max-width:1200px;margin:24px auto;padding:0 16px;">
  <h1>Mezuak</h1>

  <div class="table-wrap">
    <table>
      <thead>
      <tr>
        <th>Noiz</th>
        <th>Bidaltzailea</th>
        <th>Hartzailea</th>
        <th>Egoera</th>
        <th>Edukia</th>
      </tr>
      </thead>
      <tbody>
      <tr th:if="${mezuak == null or #lists.isEmpty(mezuak)}">
        <td colspan="5">Ez dago mezurik oraindik.</td>
      </tr>
      <tr th:each="m : ${mezuak}">
        <td th:text="${#temporals.format(m.bidalketaData, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="${m.bidaltzailea != null ? m.bidaltzailea.izena : '-'}"></td>
        <td th:text="${m.hartzailea != null ? m.hartzailea.izena : '-'}"></td>
        <td th:text="${m.irakurrita ? '📨 Irakurrita' : '✉️ Ez irakurrita'}"></td>
        <td class="message-body" th:text="${m.edukia}"></td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
