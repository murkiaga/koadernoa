<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ikaslearen fitxa</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/kudeatzaile-common.css}">
</head>
<body>
<div th:replace="kudeatzaile/fragments/navbar :: kudeatzaile-navbar"></div>

<main class="page">
  <h1>Ikaslearen fitxa</h1>

  <div th:if="${successMessage}" class="alert-success" style="margin-bottom:1rem;padding:.65rem .8rem;border-radius:.5rem;background:#ecfdf5;color:#065f46;"
       th:text="${successMessage}">Ondo</div>
  <div th:if="${errorMessage}" class="alert-error" style="margin-bottom:1rem;padding:.65rem .8rem;border-radius:.5rem;background:#fef2f2;color:#991b1b;"
       th:text="${errorMessage}">Errorea</div>

  <div class="table-wrap" style="margin-bottom:1rem;">
    <table>
      <tbody>
      <tr><th>Izena</th><td th:text="${ikaslea.izena != null ? ikaslea.izena : '-'}">-</td></tr>
      <tr><th>Abizena 1</th><td th:text="${ikaslea.abizena1 != null ? ikaslea.abizena1 : '-'}">-</td></tr>
      <tr><th>Abizena 2</th><td th:text="${ikaslea.abizena2 != null ? ikaslea.abizena2 : '-'}">-</td></tr>
      <tr><th>HNA (DIE)</th><td th:text="${ikaslea.hna != null ? ikaslea.hna : '-'}">-</td></tr>
      <tr><th>NAN (DNI)</th><td th:text="${ikaslea.nan != null ? ikaslea.nan : '-'}">-</td></tr>
      <tr>
        <th>Taldea</th>
        <td>
          <div style="display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;">
            <span th:text="${ikaslea.taldea != null ? ikaslea.taldea.izena : '-'}">-</span>
            <form th:action="@{/kudeatzaile/ikaslea/{id}/taldea(id=${ikaslea.id})}" method="post"
                  onsubmit="return confirm('Ziur zaude taldea aldatu nahi diozula? Aurtengo matrikulei eragingo die.');"
                  style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
              <input id="taldeaBilatu" type="text" placeholder="Taldea bilatu..." oninput="iragaziTaldeak(this.value)"
                     style="min-width:180px;">
              <select id="taldeaId" name="taldeaId" required style="min-width:180px;max-width:320px;">
                <option value="" disabled selected>Hautatu taldea</option>
                <option th:each="t : ${taldeak}"
                        th:value="${t.id}"
                        th:text="${t.izena}"
                        th:selected="${ikaslea.taldea != null and t.id == ikaslea.taldea.id}">
                </option>
              </select>
              <button type="submit" class="btn btn-primary">Taldea aldatu</button>
            </form>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <form class="form" method="get" th:action="@{/kudeatzaile/ikaslea/{id}(id=${ikaslea.id})}">
    <label for="ikasturteaId">Ikasturtea:</label>
    <select id="ikasturteaId" name="ikasturteaId" onchange="this.form.submit()">
      <option th:each="ik : ${ikasturteak}"
              th:value="${ik.id}"
              th:text="${ik.izena}"
              th:selected="${ik.id == hautatutakoIkasturteaId}">
      </option>
    </select>
  </form>

  <h2>Matrikulak</h2>
  <div class="table-wrap">
    <table>
      <thead>
      <tr>
        <th>Koadernoa</th>
        <th>Moduloa</th>
        <th>EEI kodea</th>
        <th>Egoera</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="m : ${matrikulak}">
        <td th:text="${m.koadernoa != null ? m.koadernoa.izena : '-'}">-</td>
        <td th:text="${m.koadernoa != null and m.koadernoa.moduloa != null ? m.koadernoa.moduloa.izena : '-'}">-</td>
        <td th:text="${m.koadernoa != null and m.koadernoa.moduloa != null ? m.koadernoa.moduloa.eeiKodea : '-'}">-</td>
        <td th:text="${m.egoera}">MATRIKULATUA</td>
      </tr>
      <tr th:if="${#lists.isEmpty(matrikulak)}">
        <td colspan="4" style="text-align:center;color:#6b7280;">Ez dago matrikularik ikasturte honetan.</td>
      </tr>
      </tbody>
    </table>
  </div>

  <a class="btn btn-secondary" th:if="${ikaslea.taldea != null}" th:href="@{/kudeatzaile/moduloa(taldeaId=${ikaslea.taldea.id})}">Itzuli</a>
  <a class="btn btn-secondary" th:if="${ikaslea.taldea == null}" th:href="@{/kudeatzaile/moduloa}">Itzuli</a>
</main>

<script th:src="@{/js/kudeatzaile-nav.js}"></script>
<script>
  function iragaziTaldeak(testua) {
    const select = document.getElementById('taldeaId');
    const q = (testua || '').toLocaleLowerCase();
    for (const option of select.options) {
      if (!option.value) continue;
      const ikusgai = option.text.toLocaleLowerCase().includes(q);
      option.hidden = !ikusgai;
    }
  }
</script>
</body>
</html>
