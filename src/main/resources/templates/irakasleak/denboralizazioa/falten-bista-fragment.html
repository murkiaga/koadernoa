<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eu">
<body>
<!-- ===================== FALTEN BISTA FRAGMENT ===================== -->
<div th:fragment="faltakBista">

    <!-- Hilabetea + botoiak (faltak bistari eutsiz) -->
    <div class="calendar-topbar">
        <div class="calendar-topbar-left">
            <a class="calendar-nav-link"
               th:href="@{/irakasle/denboralizazioa(
                        hilabetea=${hilabetea == 1 ? 12 : hilabetea - 1},
                        urtea=${hilabetea == 1 ? urtea - 1 : urtea},
                        bista='faltak')}">
                <span>←</span><span>Aurrekoa</span>
            </a>
        </div>

        <h2 th:text="${hilabeteUrtea}" style="margin: 0; text-align: center; flex: 1;">Hilabetea</h2>

        <a class="calendar-nav-link"
           th:href="@{/irakasle/denboralizazioa(
                        hilabetea=${hilabetea == 12 ? 1 : hilabetea + 1},
                        urtea=${hilabetea == 12 ? urtea + 1 : urtea},
                        bista='faltak')}">
            <span>Hurrengoa</span><span>→</span>
        </a>
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:.5rem;">
        <h3 style="margin:0;">Falten jarraipena</h3>
        <button type="button"
                class="btn btn-secondary"
                onclick="irekiFaltenInportModal()"
                style="display:inline-flex; align-items:center; gap:.5rem;">
            <span aria-hidden="true">📊</span>
            <span>hezkuntza aplikazioko faltak inportatu</span>
        </button>
    </div>

    <div class="faltak-wrapper">
      <table class="faltak-taula">
          <thead>
          <tr>
              <th rowspan="2" class="sticky-col">Ikaslea</th>

              <th rowspan="2">
                  Guztira faltak (orduetan)
                  <span class="programa-orduak-label">
                      / programatutako orduak:
                      <span th:text="${programaOrduak}">0</span>
                  </span>
              </th>

              <th rowspan="2">Falten %</th>

              <!-- Klase egun bakoitza -->
              <th th:each="egun : ${faltaEgunak}"
                  th:text="${#temporals.format(egun, 'yyyy-MM-dd')}">
                  2025-09-08
              </th>
          </tr>
          <tr>
              <!-- Bigarren lerroan: egun bakoitzeko klase orduak -->
              <th th:each="egun : ${faltaEgunak}"
                  th:text="${faltaEgunOrduak[egun]}">
                  2
              </th>
          </tr>
          </thead>

          <tbody>
          <tr th:each="row : ${faltakIkasleak}">
              <td class="ikasle-izena sticky-col"
                  th:text="${row.ikasleIzenOsoa}">
                  Abizena1 Abizena2, Izena
              </td>

              <td th:text="${row.faltaOrduak}">0</td>

              <td th:classappend="${row.faltaPortzentaia} > 20 ? ' falta-pct-altua' :
			                    (${row.faltaPortzentaia} >= 10 ? ' falta-pct-ertaina' : '')">
                  <span th:text="${#numbers.formatDecimal(row.faltaPortzentaia, 1, 2)} + '%'">0%</span>
                  <a th:if="${row.faltaPortzentaia > 20}"
                     th:href="@{/irakasle/denboralizazioa/falten-jakinarazpena/pdf(
                          matrikulaId=${row.matrikula.id},
                          hilabetea=${hilabetea},
                          urtea=${urtea})}"
                     title="Falten jakinarazpena PDF-an deskargatu"
                     aria-label="Falten jakinarazpena PDF-an deskargatu"
                     style="margin-left:.5rem; text-decoration:none;">
                      📄
                  </a>
			</td>

              <td th:each="egun : ${faltaEgunak}" class="ikasle-egun-gelaxka"
                  th:attr="data-ikaslea-id=${row.matrikula.ikaslea.id},data-data=${egun},data-izena=${row.ikasleIzenOsoa}"
                  onclick="irekiIkasleEgunOharra(this.dataset.ikasleaId,this.dataset.data,this.dataset.izena,this)">
                  <span th:text="${row.balioa(egun)}"></span>
                  <span class="ie-ikonoak">
                    <span th:if="${oharGakoak.contains(row.matrikula.ikaslea.id.toString() + '|' + egun.toString())}" title="Oharra dago">📝</span>
                    <span th:if="${jokabideGakoak.contains(row.matrikula.ikaslea.id.toString() + '|' + egun.toString())}" title="Jokabide desegokia dago">⚠️</span>
                  </span>
              </td>
          </tr>
          </tbody>
      </table>
    </div>

    <div id="faltenInportModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0;">Faltak inportatu (.xls)</h3>
                <button class="close" type="button" onclick="itxiFaltenInportModal()">×</button>
            </div>

            <form method="post"
                  enctype="multipart/form-data"
                  th:action="@{/irakasle/denboralizazioa/faltak/inportatu}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}">
                <input type="hidden" name="urtea" th:value="${urtea}">
                <input type="hidden" name="hilabetea" th:value="${hilabetea}">

                <input id="faltenInportFileInput"
                       type="file"
                       name="fitxategia"
                       accept=".xls,.xlsx"
                       style="display:none"
                       required>

                <div id="faltenDropzone"
                     style="border:2px dashed #9ca3af; border-radius:10px; padding:1rem; text-align:center; cursor:pointer; margin:1rem 0;">
                    <p style="margin:0 0 .4rem 0; font-weight:600;">Arrastatu fitxategia hona</p>
                    <p style="margin:0; color:#6b7280;">edo klik egin "aukeratu fitxategia" egiteko</p>
                    <p id="faltenInportFileName" style="margin:.7rem 0 0 0; font-size:.9rem; color:#111827;"></p>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn secondary" onclick="document.getElementById('faltenInportFileInput').click()">
                        aukeratu fitxategi
                    </button>
                    <button type="button" class="btn secondary" onclick="itxiFaltenInportModal()">Utzi</button>
                    <button type="submit" class="btn primary">Inportatu</button>
                </div>
            </form>
        </div>
    </div>

</div>

</body>
</html>
