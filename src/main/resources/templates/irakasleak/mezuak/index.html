<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eu">
<head>
  <meta charset="UTF-8">
  <title>Mezuak</title>
  <link rel="stylesheet" th:href="@{/css/irakasle-navbar.css}">
  <link rel="stylesheet" th:href="@{/css/irakasle-common.css}">
  <style>
    .read-btn{min-width:96px;text-decoration:none;font-weight:600;}
  </style>
</head>
<body>
<div th:replace="~{irakasleak/fragments/irakasle-navbar :: navbar(${koadernoAktiboa}, ${irakasleKoadernoAktiboak})}"></div>
<main style="max-width:1000px;margin:24px auto;padding:0 16px;">
  <h1>Mezuak</h1>
  <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>
  <table>
    <thead><tr><th>Noiz</th><th>Bidaltzailea</th><th>Egoera</th><th></th></tr></thead>
    <tbody>
      <tr th:each="m : ${mezuak}">
        <td th:text="${#temporals.format(m.bidalketaData, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="${m.bidaltzailea != null ? m.bidaltzailea.izena : '-'}"></td>
        <td th:text="${m.irakurrita ? '📨 Irakurrita' : '✉️ Ez irakurrita'}"></td>
        <td><a class="btn btn-primary read-btn" th:href="@{|/irakasle/mezuak/${m.id}|}">Irakurri</a></td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
