<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eu">
<head>
  <meta charset="UTF-8">
  <title>Irakaslearen orrialdea</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Navbar + estilo komunak -->
  <link rel="stylesheet" th:href="@{/css/irakasle-navbar.css}">
  <link rel="stylesheet" th:href="@{/css/irakasle-common.css}">
  <link rel="stylesheet" th:href="@{/css/irakasle-partekatu.css}">

  <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
  <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}"/>

  <script th:src="@{/js/irakasle-nav.js}"></script>


  <style>
    /* Orrialde honetako layout berezia */
    body{
      margin:0;
      background:#f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .hasiera-container{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:calc(100vh - 120px);
      padding:2rem 1rem 4rem;
    }
    .hasiera-koad{
      width:80%;
      max-width:900px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:20px 24px;
      box-shadow:0 2px 6px rgba(0,0,0,.06);
    }
    .head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }
    .tit{
      font-weight:700;
      font-size:1.1rem;
    }
    .meta{
      color:#475569;
      font-size:.9rem;
    }

    /* Toggle lock/unlock */
    .btn-toggle{
      display:flex;
      border-radius:9999px;
      overflow:hidden;
      border:1px solid #cbd5e1;
    }
    .btn-toggle .btn-toggle-option{
      padding:.35rem .8rem;
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      gap:.4rem;
      font-size:.85rem;
    }
    .btn-toggle .btn-toggle-option.selected{
      font-weight:600;
    }
    .btn-toggle .dark.selected{
      background:#e5e7eb;
    }
    .btn-toggle .primary.selected{
      background:#22c55e;
      color:#fff;
    }
    .icon{
      width:14px;
      height:14px;
      border-radius:2px;
      display:inline-block;
    }
    .icon.locked{
      background:#64748b;
    }
    .icon.unlocked{
      background:#16a34a;
    }

    /* Ordutegia (grid) */
    .grid-viewport{
      border:1px solid #e5e7eb;
      border-radius:12px;
      overflow:auto;
      margin-top:10px;
      background:#fff;
      max-height:520px;
    }
    table.grid{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }
    .grid col:first-child{
      width:60px;
    }
    .grid th,
    .grid td{
      border:1px solid #eee;
      height:48px;
      box-sizing:border-box;
    }
    .grid thead th{
      background:#fafafa;
      font-weight:600;
      text-align:center;
      padding:.6rem;
      white-space:nowrap;
      position:sticky;
      top:0;
      z-index:2;
    }
    .grid thead th:first-child{
      padding:0;
    }
    .grid tbody th{
      background:#fcfcfc;
      text-align:center;
      font-weight:500;
    }
    .grid td{
      cursor:default;
    }
    .grid td.editable{
      cursor:pointer;
    }
    .grid td.selected{
      background:#dcdcdc;
    }

    .actions{
      margin-top:14px;
      display:none;
      justify-content:space-between;
    }
    .actions.show{
      display:flex;
    }

    /* .btn basea irakasle-common.css-n dago;
       hemen bakarrik cancel estilo berezia gainidaztea */
    .btn.cancel{
      background:#f3f4f6;
      color:#444;
      border-color:#d1d5db;
    }
    .btn.cancel:hover{
      background:#e5e7eb;
    }

    /* “Koaderno berria sortu” botoia (floating, beti ikusgai) */
    .berria-sortu {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 90;
      pointer-events:none;
    }
    .berria-sortu .btn-create {
      pointer-events:auto;
    }
    .btn-create{
      background:#3b82f6;
      color:white;
      padding:0.8rem 1.6rem;
      border-radius:12px;
      font-weight:600;
      box-shadow:0 3px 8px rgba(0,0,0,0.15);
      text-decoration:none;
      transition:background 0.2s, transform 0.2s;
    }
    .btn-create:hover{
      background:#2563eb;
      transform:translateY(-1px);
    }

    .ordutegi-tabs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0 8px;}
    .ordutegi-tab{border:none;background:transparent;color:#475569;font-weight:600;cursor:pointer;font-size:.9rem;padding:0 .15rem;}
    .ordutegi-tab:hover{color:#0f172a;}
    .ordutegi-tab.active{color:#0f172a;text-decoration:underline;text-underline-offset:3px;}
    .ordutegi-date-range{color:#64748b;font-size:.82rem;font-weight:500;margin-left:auto;}
    .ordutegi-new{margin-top:10px;display:flex;justify-content:flex-end;}
    .ordutegi-new{gap:10px;align-items:center;flex-wrap:wrap;}
    .dual-badge{display:none;margin-top:10px;padding:.6rem .8rem;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;color:#1d4ed8;font-weight:600;}
    .dual-badge.show{display:block;}
    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:999;}
    .modal-overlay.show{display:flex;}
    .modal-card{width:min(420px,92vw);background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1rem 1rem .9rem;box-shadow:0 10px 30px rgba(2,6,23,.2);}
    .modal-card h3{margin:.2rem 0 .8rem;}
    .modal-field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.8rem;}
    .modal-actions{display:flex;justify-content:flex-end;gap:.55rem;margin-top:.9rem;}

  </style>
</head>
<body>

<!-- Navbar -->
<div th:if="${koadernoAktiboa != null}"
     th:replace="irakasleak/fragments/irakasle-navbar :: navbar(${koadernoAktiboa}, ${irakasleKoadernoAktiboak})">
</div>

<div class="page">
  <h1 th:text="'Kaixo, ' + ${irakaslea.izena} + '!'">Kaixo!</h1>
  <div th:if="${success}" class="alert alert-success" style="margin-bottom:1rem;" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" style="margin-bottom:1rem;" th:text="${error}"></div>

  <!-- Koaderno aktiborik EZ badago -->
	<div th:if="${koadernoAktiboa == null}">
	  <p>Ez duzu koadernorik aukeratuta edo sortuta. Hasi koaderno berria sortzen!</p>
	  <a th:href="@{/irakasle/koadernoa/berria}" class="btn-create">Koaderno berria sortu</a>
	</div>

  <!-- Koaderno aktiboa badago -->
  <div th:if="${koadernoAktiboDago}" class="hasiera-container">
    <div class="hasiera-koad">

      <div class="head">
        <div>
          <div class="tit"
               th:text="${koadernoAktiboa.moduloa != null ? koadernoAktiboa.moduloa.izena : '(modulurik ez)'}">
            Moduloa
          </div>
          <div class="meta"
               th:text="${koadernoAktiboa.egutegia != null && koadernoAktiboa.egutegia.ikasturtea != null ? koadernoAktiboa.egutegia.ikasturtea.izena : '(ikasturterik ez)'}">
            2025-2026
          </div>
        </div>

        <!-- Toggle: lock/unlock (defektuz lock) -->
        <div id="KoadernoakConfigPortadaContentButton"
             data-selected_action="lock"
             class="btn-toggle">
          <div class="btn-toggle-option dark selected" data-action="lock">
            <i class="icon locked"></i><span>Blokeatuta</span>
          </div>
          <div class="btn-toggle-option primary" data-action="unlock">
            <i class="icon unlocked"></i><span>Desblokeatu</span>
          </div>
        </div>
      </div>

      <!-- Ordutegia -->

      <div class="ordutegi-tabs" id="ordutegiTabs" th:attr="data-active=${activeScheduleStartDate}, data-multiple=${ordutegiAnitz}">
        <button type="button" class="ordutegi-tab"
                th:each="tab : ${ordutegiInfo}"
                th:attr="data-key=${tab.key}, data-base-label=${tab.label}"
                th:text="${tab.label}">Ordutegia</button>
        <span id="ordutegiRange" class="ordutegi-date-range"></span>
      </div>
      <div id="dualOrdutegiInfo" class="dual-badge"></div>
      <div class="grid-viewport">
        <form th:action="@{|/irakasle/koadernoa/${koadernoAktiboa.id}/ordutegia|}"
              method="post"
              id="ordutegiForm">
          <input type="hidden"
                 th:if="${_csrf != null}"
                 th:name="${_csrf.parameterName}"
                 th:value="${_csrf.token}"/>

          <table class="grid"
                 id="ordutegiTaula"
                 th:attr="data-koaderno-id=${koadernoAktiboa.id}">
            <colgroup>
              <col>
              <col span="5">
            </colgroup>

            <thead>
            <tr>
              <th></th>
              <th th:each="c : ${cols}"
                  th:text="${#strings.capitalize(c.name().toLowerCase())}">
                Astelehena
              </th>
            </tr>
            </thead>

            <tbody id="gridBody">
            <tr th:each="r, rStat : ${rows}">
              <th th:text="${r}">1</th>
              <td th:each="c, stat : ${cols}"
                  th:attr="data-col=${stat.index + 1}, data-row=${r}"
                  th:classappend="${selected.contains((stat.index + 1) + '-' + r)} ? 'selected' : ''">
                <span th:if="${irakasleOrdutegiRows != null and irakasleOrdutegiRows[rStat.index][stat.index] != null}"
                      th:text="${irakasleOrdutegiRows[rStat.index][stat.index]}">SRED · 1SM2A · G01</span>
              </td>
            </tr>
            </tbody>
          </table>

          <!-- input ezkutuak (behar izanez gero) -->
          <div id="hiddenInputs">
            <template id="tpl"><input type="hidden" name="cells"/></template>
            <span th:each="k : ${selected}">
              <input type="hidden" name="cells" th:value="${k}">
            </span>
          </div>

        </form>
      </div>

      <div class="ordutegi-new">
        <button type="button" id="ordutegiBerriaBtn" class="btn btn-secondary">Ordutegi berria</button>
        <button type="button" id="ordutegiEzabatuBtn" class="btn btn-danger">Ordutegia ezabatu</button>
      </div>

      <!-- Irakasle zerrenda + partekatu atala (fragment berria) -->
      <div th:replace="~{irakasleak/fragments/irakasle-zerrenda-atala :: irakasleZerrenda(${koadernoAktiboa}, ${irakaslea})}"></div>

    </div>
  </div>

  <!-- Beheko “Koaderno berria sortu” botoia (beti ikusgai) -->
  <div class="berria-sortu">
    <a th:href="@{/irakasle/koadernoa/berria}" class="btn-create">Koaderno berria sortu</a>
  </div>
</div>

<!-- Koadernoa EZABATZEKO fragment-a (botoia + modala, behean ezkerrean) -->
<th:block th:if="${koadernoAktiboa != null}">
  <div th:replace="~{irakasleak/fragments/koadernoa-ezabatu :: koadernoa-ezabatu-fragment(${koadernoAktiboa})}"></div>
</th:block>

<div id="ordutegiModal" class="modal-overlay" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="ordutegiModalTitle">
    <h3 id="ordutegiModalTitle">Ordutegi berria sortu</h3>
    <div class="modal-field">
      <label for="modalHasieraData">Hasiera data</label>
      <input type="date" id="modalHasieraData" required>
    </div>
    <div class="modal-field" th:if="${moduloDualOrduak > 0}">
      <label style="display:flex;align-items:center;gap:.45rem;">
        <input type="checkbox" id="modalDualOrdutegia">
        <span>Dual ordutegia</span>
      </label>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="ordutegiModalCancel">Utzi</button>
      <button type="button" class="btn btn-primary" id="ordutegiModalCreate">Sortu</button>
    </div>
  </div>
</div>

<script th:inline="javascript">
(function () {
  const table = document.getElementById('ordutegiTaula');
  if (!table) return; // nothing to wire

  const tabsWrap = document.getElementById('ordutegiTabs');
  const rangeEl = document.getElementById('ordutegiRange');
  const berriaBtn = document.getElementById('ordutegiBerriaBtn');
  const ezabatuBtn = document.getElementById('ordutegiEzabatuBtn');
  const dualInfo = document.getElementById('dualOrdutegiInfo');
  const ordutegiModal = document.getElementById('ordutegiModal');
  const modalHasieraData = document.getElementById('modalHasieraData');
  const modalDualOrdutegia = document.getElementById('modalDualOrdutegia');
  const ordutegiModalCancel = document.getElementById('ordutegiModalCancel');
  const ordutegiModalCreate = document.getElementById('ordutegiModalCreate');
  const schedules = /*[[${ordutegiTabs}]]*/ {};
  const info = /*[[${ordutegiInfo}]]*/ [];
  const dualMap = /*[[${ordutegiDualMap}]]*/ {};
  const tarteHutsaMap = /*[[${ordutegiTarteHutsaMap}]]*/ {};
  const moduloDualOrduak = /*[[${moduloDualOrduak}]]*/ 0;
  const todayActiveScheduleStartDate = tabsWrap ? tabsWrap.dataset.active : null;
  let selectedScheduleStartDate = todayActiveScheduleStartDate;

  const toggle = document.getElementById('KoadernoakConfigPortadaContentButton');

  // CSRF from Spring Security
  const metaToken  = document.querySelector('meta[name="_csrf"]');
  const metaHeader = document.querySelector('meta[name="_csrf_header"]');
  const CSRF_TOKEN  = metaToken  ? metaToken.content  : null;
  const CSRF_HEADER = metaHeader ? metaHeader.content : "X-CSRF-TOKEN";

  // Hasieran: toggle badago → blokeatuta; bestela → editagarri.
  setEditable(!toggle); // toggle ez badago, true; badago → false

  if (toggle) {
    toggle.addEventListener('click', (e) => {
      const opt = e.target.closest('.btn-toggle-option');
      if (!opt) return;
      const action = opt.dataset.action;

      toggle.querySelectorAll('.btn-toggle-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');

      setEditable(action === 'unlock');
    });
  }

  function setEditable(on) {
    if (dualMap[selectedScheduleStartDate]) on = false;
    table.querySelectorAll('td').forEach(td => {
      td.classList.toggle('editable', on);
      td.onclick = on ? onCellClick : null;
    });
  }

  async function onCellClick(ev) {
    const td = ev.currentTarget;
    const wasSelected = td.classList.contains('selected');

    // Optimistic UI
    td.classList.toggle('selected');
    const nowSelected = !wasSelected;

    const col = td.dataset.col;
    const row = td.dataset.row;
    const koadernoId = table.dataset.koadernoId;

    try {
      const params = new URLSearchParams({ col, row, selected: String(nowSelected), scheduleStartDate: selectedScheduleStartDate });
      const res = await fetch(`/irakasle/koadernoa/${koadernoId}/ordutegia/cell`, {
        method: 'POST',
        headers: Object.assign(
          { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          CSRF_TOKEN ? { [CSRF_HEADER]: CSRF_TOKEN } : {}
        ),
        body: params
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json().catch(() => ({ ok: true }));
      if (!json.ok) throw new Error(json.error || 'Errorea gordetzean');

      const key = `${col}-${row}`;
      if (!Array.isArray(schedules[selectedScheduleStartDate])) schedules[selectedScheduleStartDate] = [];
      if (nowSelected) {
        if (!schedules[selectedScheduleStartDate].includes(key)) schedules[selectedScheduleStartDate].push(key);
      } else {
        schedules[selectedScheduleStartDate] = schedules[selectedScheduleStartDate].filter(k => k !== key);
      }
      tarteHutsaMap[selectedScheduleStartDate] = !dualMap[selectedScheduleStartDate]
        && schedules[selectedScheduleStartDate].length === 0;
      renderSchedule(selectedScheduleStartDate);

    } catch (err) {
      // Revert optimistic change
      td.classList.toggle('selected');
      const key = `${col}-${row}`;
      if (!Array.isArray(schedules[selectedScheduleStartDate])) schedules[selectedScheduleStartDate] = [];
      if (nowSelected) {
        schedules[selectedScheduleStartDate] = schedules[selectedScheduleStartDate].filter(k => k !== key);
      } else if (!schedules[selectedScheduleStartDate].includes(key)) {
        schedules[selectedScheduleStartDate].push(key);
      }
      console.error('Ezin izan da gorde slot-a:', err);
      alert('Ezin izan da gorde. Saiatu berriro, mesedez.');
    }
  }


  function minusOneDay(isoDate) {
    const d = new Date(`${isoDate}T00:00:00`);
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0, 10);
  }

  function scheduleIsMultiple() {
    return Array.isArray(info) && info.length > 1;
  }

  function getTodayIso() {
    return new Date().toISOString().slice(0, 10);
  }

  function getEffectiveActiveKey() {
    if (!Array.isArray(info) || info.length === 0) return todayActiveScheduleStartDate;
    const today = getTodayIso();
    const keys = info.map(i => i.key).filter(Boolean).sort();
    let effective = keys[0] || todayActiveScheduleStartDate;
    for (const k of keys) {
      if (k <= today) effective = k;
      if (k > today) break;
    }
    return effective;
  }

  function recomputeScheduleMeta() {
    info.sort((a, b) => (a.key || '').localeCompare(b.key || ''));

    info.forEach((item, idx) => {
      item.label = scheduleIsMultiple() ? `${idx + 1}. ordutegia` : 'Ordutegia';
      const next = info[idx + 1];
      item.from = item.from || item.key;
      item.to = next?.from ? minusOneDay(next.from) : '';

      const btn = tabsWrap?.querySelector(`.ordutegi-tab[data-key=\"${item.key}\"]`);
      if (btn) {
        btn.dataset.baseLabel = item.label;
      }
    });
  }

  function renderSchedule(key) {
    selectedScheduleStartDate = key;
    const isDual = !!dualMap[key];
    const selectedSet = new Set((schedules[key] || []));
    table.querySelectorAll('td').forEach(td => {
      const cellKey = `${td.dataset.col}-${td.dataset.row}`;
      td.classList.toggle('selected', selectedSet.has(cellKey));
    });
    const activeKeyByToday = getEffectiveActiveKey();
    if (tabsWrap) {
      tabsWrap.querySelectorAll('.ordutegi-tab[data-key]').forEach(btn => {
        const isSelected = btn.dataset.key === key;
        btn.classList.toggle('active', isSelected);
        const baseLabel = btn.dataset.baseLabel || 'Ordutegia';
        const isTodayActive = btn.dataset.key === activeKeyByToday;
        let txt = (scheduleIsMultiple() && isTodayActive) ? `${baseLabel} (aktibo)` : baseLabel;
        if (dualMap[btn.dataset.key]) txt += ' [DUAL]';
        else if (tarteHutsaMap[btn.dataset.key]) txt += ' [0h]';
        btn.textContent = txt;
      });
    }
    const currentInfo = info.find(i => i.key === key);
    if (rangeEl && currentInfo) {
      rangeEl.textContent = `Noiztik: ${currentInfo.from}` + (currentInfo.to ? ` / Noizra: ${currentInfo.to}` : '');
    }
    if (dualInfo) {
      if (isDual) {
        dualInfo.classList.add('show');
        dualInfo.textContent = `DUAL ordutegia: blokerik ez. Kontabilizatuko diren orduak: ${moduloDualOrduak}`;
      } else if (tarteHutsaMap[key]) {
        dualInfo.classList.add('show');
        dualInfo.textContent = 'Tarte hutsa: ordutegi honek 0 ordu ditu.';
      } else {
        dualInfo.classList.remove('show');
        dualInfo.textContent = '';
      }
    }
    setEditable(toggle ? !!toggle.querySelector('.btn-toggle-option[data-action="unlock"].selected') : true);
  }

  tabsWrap?.querySelectorAll('.ordutegi-tab[data-key]').forEach(btn => {
    btn.addEventListener('click', () => renderSchedule(btn.dataset.key));
  });

  berriaBtn?.addEventListener('click', () => {
    if (!ordutegiModal || !modalHasieraData) return;
    modalHasieraData.value = '';
    if (modalDualOrdutegia) modalDualOrdutegia.checked = false;
    ordutegiModal.classList.add('show');
    ordutegiModal.setAttribute('aria-hidden', 'false');
  });

  ordutegiModalCancel?.addEventListener('click', () => {
    ordutegiModal?.classList.remove('show');
    ordutegiModal?.setAttribute('aria-hidden', 'true');
  });

  ordutegiModal?.addEventListener('click', (e) => {
    if (e.target === ordutegiModal) {
      ordutegiModal.classList.remove('show');
      ordutegiModal.setAttribute('aria-hidden', 'true');
    }
  });

  ordutegiModalCreate?.addEventListener('click', async () => {
    const hasieraData = (modalHasieraData?.value || '').trim();
    if (!hasieraData) {
      alert('Hasiera data sartu behar da.');
      return;
    }
    const dualOrdutegia = !!(modalDualOrdutegia && modalDualOrdutegia.checked);
    const tarteHutsa = !dualOrdutegia;

    const koadernoId = table.dataset.koadernoId;
    const params = new URLSearchParams({ hasieraData, dualOrdutegia: String(dualOrdutegia) });
    const res = await fetch(`/irakasle/koadernoa/${koadernoId}/ordutegia/berria`, {
      method: 'POST',
      headers: Object.assign(
        { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
        CSRF_TOKEN ? { [CSRF_HEADER]: CSRF_TOKEN } : {}
      ),
      body: params
    });

    if (!res.ok) {
      alert('Ezin izan da ordutegi berria sortu');
      return;
    }

    const json = await res.json().catch(() => ({}));
    const key = json.hasieraData || hasieraData;

    if (!schedules[key]) {
      schedules[key] = [];
    }
    dualMap[key] = dualOrdutegia;
    tarteHutsaMap[key] = tarteHutsa;

    if (!info.find(i => i.key === key)) {
      info.push({ key, from: key, to: '', label: 'Ordutegia', tarteHutsa: String(tarteHutsa), dual: String(dualOrdutegia) });

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ordutegi-tab';
      btn.dataset.key = key;
      btn.dataset.baseLabel = 'Ordutegia';
      btn.addEventListener('click', () => renderSchedule(key));
      tabsWrap?.insertBefore(btn, rangeEl);
    }

    recomputeScheduleMeta();
    renderSchedule(key);
    setEditable(true);
    const unlockBtn = toggle ? toggle.querySelector('.btn-toggle-option[data-action="unlock"]') : null;
    if (unlockBtn) {
      toggle.querySelectorAll('.btn-toggle-option').forEach(o => o.classList.remove('selected'));
      unlockBtn.classList.add('selected');
    }
    ordutegiModal?.classList.remove('show');
    ordutegiModal?.setAttribute('aria-hidden', 'true');
  });

  ezabatuBtn?.addEventListener('click', async () => {
    if (!selectedScheduleStartDate) return;
    if (!confirm(`Ziur zaude ${selectedScheduleStartDate} hasierako ordutegia ezabatu nahi duzula?`)) return;
    const koadernoId = table.dataset.koadernoId;
    const params = new URLSearchParams({ hasieraData: selectedScheduleStartDate });
    const res = await fetch(`/irakasle/koadernoa/${koadernoId}/ordutegia/ezabatu`, {
      method: 'POST',
      headers: Object.assign(
        { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
        CSRF_TOKEN ? { [CSRF_HEADER]: CSRF_TOKEN } : {}
      ),
      body: params
    });
    if (!res.ok) {
      alert('Ezin izan da ordutegia ezabatu');
      return;
    }
    const idx = info.findIndex(i => i.key === selectedScheduleStartDate);
    if (idx >= 0) info.splice(idx, 1);
    delete schedules[selectedScheduleStartDate];
    delete dualMap[selectedScheduleStartDate];
    delete tarteHutsaMap[selectedScheduleStartDate];
    tabsWrap?.querySelector(`.ordutegi-tab[data-key="${selectedScheduleStartDate}"]`)?.remove();
    recomputeScheduleMeta();
    const nextKey = info[0]?.key || null;
    if (nextKey) renderSchedule(nextKey);
    else location.reload();
  });

  recomputeScheduleMeta();
  if (selectedScheduleStartDate) renderSchedule(selectedScheduleStartDate);
})();
</script>
<script th:src="@{/js/irakasle-partekatu.js}"></script>
</body>
</html>
