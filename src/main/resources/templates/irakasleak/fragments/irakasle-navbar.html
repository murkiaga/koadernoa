<div th:fragment="navbar (koadernoAktiboa, irakasleKoadernoak)">

  <!-- EBAL kolore globalak (DB-tik) -->
  <style th:inline="text">
    :root {
      --ebal1-color: [[${ebal1Kolore} ?: '#b3d9ff']];
      --ebal2-color: [[${ebal2Kolore} ?: '#ffd699']];
      --ebal3-color: [[${ebal3Kolore} ?: '#b2f2bb']];
    }
  </style>

  <div class="t-nav">
    <!-- Goiko barra (desktop menu + hamburger) -->
    <div class="t-navbar">
      <div class="t-left">
        <span class="koaderno-izena"
              th:text="${koadernoAktiboa != null ? koadernoAktiboa.kodea : 'Ez dago koadernorik'}">
          Koaderno izena
        </span>

        <div class="koaderno-hautapena">
          <label for="koadernoSelect">Koadernoak:</label>
          <select id="koadernoSelect" onchange="aldatuKoadernoa(this.value)">

            <!-- 1) Koaderno aktiboa IRakaslearen zerrendan EZ badago → kontsulta modua -->
            <option th:if="${koadernoAktiboa != null and navbarKontsultaModua}"
                    th:value="${koadernoAktiboa.id}"
                    th:text="${koadernoAktiboa.kodea + ' (kontsulta)'}"
                    selected="selected">
              Pertsonalizatua
            </option>

            <!-- 2) Irakaslearen “ohiko” koadernoak -->
            <option th:each="k : ${irakasleKoadernoak}"
                    th:value="${k.id}"
                    th:text="${k.izenaTaldearekin}"
                    th:selected="${koadernoAktiboa != null
                                  and !navbarKontsultaModua
                                  and k.id == koadernoAktiboa.id}">
            </option>
          </select>

          <th:block th:if="${koadernoAktiboa != null}">
            <a th:if="${koadernoAktiboa.hasMoodleEsteka()}"
               class="moodle-navbar-link"
               th:href="${koadernoAktiboa.moodleEsteka}"
               target="_blank"
               rel="noopener noreferrer"
               title="Ireki Moodle ikastaroa"
               aria-label="Ireki koaderno aktiboaren Moodle ikastaroa">
              <img th:src="@{/img/moodle.png}" alt="Moodle" class="moodle-navbar-icon">
            </a>

            <button th:unless="${koadernoAktiboa.hasMoodleEsteka()}"
                    type="button"
                    class="moodle-navbar-link moodle-navbar-button"
                    onclick="MoodleModal.open()"
                    title="Gehitu Moodle ikastaroaren esteka"
                    aria-label="Gehitu koaderno aktiboaren Moodle esteka">
              <img th:src="@{/img/moodle_grises.png}" alt="Moodle esteka ezarri gabe" class="moodle-navbar-icon">
            </button>
          </th:block>
        </div>
      </div>

      <!-- Desktop nab: ikusgai soilik pantaila zabalean -->
      <nav class="t-desktop" aria-label="Irakasle nabigazioa">
        <ul class="nav-links">
          <li><a th:href="@{/irakasle}"
                 th:classappend="${currentPath == '/irakasle'} ? 'active'">Hasiera</a></li>
          <th:block th:if="${koadernoAktiboa != null}"> 
	          <li><a th:href="@{/irakasle/egutegia}"
	                 th:classappend="${currentPath.startsWith('/irakasle/egutegia')} ? 'active'">Egutegia</a></li>
	          <li><a th:href="@{/irakasle/ikasleak}"
	                 th:classappend="${currentPath.startsWith('/irakasle/ikasleak')} ? 'active'">Ikasleak</a></li>
	          <li><a th:href="@{/irakasle/programazioa}"
	                 th:classappend="${currentPath.startsWith('/irakasle/programazioa')} ? 'active'">Programazioa</a></li>
	          <li><a th:href="@{/irakasle/denboralizazioa}"
	                 th:classappend="${currentPath.startsWith('/irakasle/denboralizazioa')} ? 'active'">Denboralizazioa</a></li>
	          <li><a th:href="@{/irakasle/notak}"
	                 th:classappend="${currentPath.startsWith('/irakasle/notak')} ? 'active'">Notak</a></li>
	          <li><a th:href="@{/irakasle/estatistikak}"
	                 th:classappend="${currentPath.startsWith('/irakasle/estatistikak')} ? 'active'">Estatistikak</a></li>
	      </th:block>
          <li th:if="${#authorization.expression('hasAnyRole(''KUDEATZAILEA'',''ADMIN'')')}">
            <a th:href="@{/kudeatzaile}">Kudeaketa</a>
          </li>
          <li><a th:href="@{/irakasle/mezuak}" th:classappend="${currentPath == '/irakasle/mezuak'} ? 'active'" th:if="${irakurriGabekoMezuKop > 0}"> ✉️ <span th:text="${irakurriGabekoMezuKop}"></span></a></li>
          <li>
            <form th:action="@{/logout}" method="post">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="logout-btn">Irten</button>
            </form>
          </li>
        </ul>
      </nav>

      <!-- Hamburger (mugikorra) -->
      <button class="t-hamb" type="button" onclick="TNav.toggle()" aria-expanded="false" aria-controls="tNav">
        ☰ Menua
      </button>
    </div>

    <!-- Panel tolesgarria (mugikorra, fullscreen) -->
    <div id="tNav" class="t-panel" aria-hidden="true">
      <div class="t-panel-header">
        <button type="button" onclick="TNav.toggle()" aria-label="Itxi">✕ Itxi</button>
      </div>
      <div class="t-panel-content">
        <ul class="t-list">
          <li><a th:href="@{/irakasle}"
                 th:classappend="${currentPath == '/irakasle'} ? 'active'">Hasiera</a></li>
          <li><a th:href="@{/irakasle/egutegia}"
                 th:classappend="${currentPath.startsWith('/irakasle/egutegia')} ? 'active'">Egutegia</a></li>
          <li><a th:href="@{/irakasle/ikasleak}"
                 th:classappend="${currentPath.startsWith('/irakasle/ikasleak')} ? 'active'">Ikasleak</a></li>
          <li><a th:href="@{/irakasle/programazioa}"
                 th:classappend="${currentPath.startsWith('/irakasle/programazioa')} ? 'active'">Programazioa</a></li>
          <li><a th:href="@{/irakasle/denboralizazioa}"
                 th:classappend="${currentPath.startsWith('/irakasle/denboralizazioa')} ? 'active'">Denboralizazioa</a></li>
          <li><a th:href="@{/irakasle/notak}"
                 th:classappend="${currentPath.startsWith('/irakasle/notak')} ? 'active'">Notak</a></li>
          <li><a th:href="@{/irakasle/estatistikak}"
                 th:classappend="${currentPath.startsWith('/irakasle/estatistikak')} ? 'active'">Estatistikak</a></li>
          <li th:if="${#authorization.expression('hasAnyRole(''KUDEATZAILEA'',''ADMIN'')')}">
            <a th:href="@{/kudeatzaile}">Kudeaketa</a>
          </li>
          <li><a th:href="@{/irakasle/mezuak}" th:classappend="${currentPath == '/irakasle/mezuak'} ? 'active'">🔔 <span th:if="${irakurriGabekoMezuKop > 0}" th:text="${irakurriGabekoMezuKop}"></span></a></li>
          <li>
            <form th:action="@{/logout}" method="post">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="logout-btn">Irten</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div th:if="${koadernoAktiboa != null and !koadernoAktiboa.hasMoodleEsteka()}"
       id="moodleEstekaModal"
       class="moodle-modal"
       aria-hidden="true">
    <div class="moodle-modal__backdrop" onclick="MoodleModal.close()"></div>
    <div class="moodle-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="moodleEstekaModalTitle">
      <div class="moodle-modal__header">
        <h2 id="moodleEstekaModalTitle">Moodle ikastaroaren esteka</h2>
        <button type="button" class="moodle-modal__close" onclick="MoodleModal.close()" aria-label="Itxi">×</button>
      </div>
      <form th:action="@{/irakasle/koadernoa/{id}/moodle-esteka(id=${koadernoAktiboa.id})}" method="post" class="moodle-modal__form">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="next" th:value="${currentPath}"/>
        <label for="moodleEstekaInput">Esteka</label>
        <input id="moodleEstekaInput"
               name="moodleEsteka"
               type="url"
               required
               placeholder="https://moodle.fpzornotza.com/course/view.php?id=338">
        <div class="moodle-modal__actions">
          <button type="button" class="moodle-modal__secondary" onclick="MoodleModal.close()">Utzi</button>
          <button type="submit" class="moodle-modal__primary">Gorde</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function aldatuKoadernoa(id){
      const next = encodeURIComponent(location.pathname + location.search);
      location.href = '/irakasle/koadernoa/' + id + '?next=' + next;
    }

    window.MoodleModal = (function(){
      function modal(){ return document.getElementById('moodleEstekaModal'); }
      function input(){ return document.getElementById('moodleEstekaInput'); }
      function open(){
        const el = modal();
        if (!el) return;
        el.classList.add('is-open');
        el.setAttribute('aria-hidden', 'false');
        setTimeout(function(){ const i = input(); if (i) i.focus(); }, 0);
      }
      function close(){
        const el = modal();
        if (!el) return;
        el.classList.remove('is-open');
        el.setAttribute('aria-hidden', 'true');
      }
      document.addEventListener('keydown', function(e){
        if (e.key === 'Escape') close();
      });
      return { open, close };
    })();
  </script>
</div>
