<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org" lang="eu"><body>
<div th:fragment="modalak">
<style>
  .ie-popup { display:none; position:fixed; z-index:3000; width:min(380px,calc(100vw - 24px)); background:#fff; border:1px solid #cbd5e1; border-radius:10px; padding:14px; box-shadow:0 8px 28px rgba(15,23,42,.24); }
  .ie-popup.open { display:block; }
  .ie-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.48); z-index:3100; align-items:center; justify-content:center; }
  .ie-modal.open { display:flex; }
  .ie-kutxa { background:#fff; border-radius:12px; padding:20px; width:min(780px,94vw); max-height:90vh; overflow:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); }
  .ie-popup textarea,.ie-kutxa textarea,.ie-kutxa select { width:100%; box-sizing:border-box; margin:6px 0 12px; padding:8px; }
  .ie-goiburua { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .ie-goiburua h3 { margin:0; }
  .ie-itxi { border:0; background:transparent; font-size:1.2rem; cursor:pointer; padding:0 3px; }
  .ie-ekintzak { display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap; }
  .ikasle-egun-gelaxka { cursor:pointer; }
  .ie-ikonoak { font-size:.82rem; white-space:nowrap; }
  .ikasle-egun-ikonoa { border:0; background:transparent; padding:3px 5px; border-radius:5px; cursor:pointer; font-size:1.05rem; line-height:1; }
  .ikasle-egun-ikonoa:hover,.ikasle-egun-ikonoa:focus-visible { background:#e5e7eb; outline:2px solid #64748b; }
  .ikasle-egun-ikonoa.inaktibo { filter:grayscale(1); opacity:.32; }
  .ikasle-egun-ikonoa.aktibo { filter:none; opacity:1; }
  .ikasle-egun-pdfak { display:inline-flex; gap:3px; margin-left:2px; }
</style>
<div id="oharPopup" class="ie-popup" role="dialog" aria-modal="false" aria-labelledby="oharPopupIzenburua">
  <div class="ie-goiburua"><h3 id="oharPopupIzenburua">Eguneko oharra</h3><button class="ie-itxi" type="button" onclick="itxiIkasleEgunModalak()" aria-label="Itxi">×</button></div>
  <p style="margin:.45rem 0"><strong id="oharIkaslea"></strong> · <span id="oharData"></span></p>
  <textarea id="oharTestua" rows="4" maxlength="5000" placeholder="Idatzi egun horretako oharra..."></textarea>
  <div id="oharErrorea" class="alert alert-error" style="display:none"></div>
  <div class="ie-ekintzak"><a id="oharPopupPdfa" class="btn btn-secondary" href="#" target="_blank" style="display:none" onclick="event.stopPropagation()">PDFa ikusi</a><button id="oharPopupJokabideBtn" type="button" class="btn btn-secondary" onclick="irekiJokabideModal()">Jokabide desegokia sortu</button><button type="button" class="btn btn-secondary" onclick="ezabatuOharra()">Ezabatu</button><button type="button" class="btn btn-primary" onclick="gordeOharra()">Gorde</button></div>
</div>
<div id="jokabideModal" class="ie-modal"><div class="ie-kutxa"><div class="ie-goiburua"><h3 id="jokabideModalIzenburua">Jokabide desegokiagatiko idatzizko ohartarazpena</h3><button class="ie-itxi" type="button" onclick="itxiIkasleEgunModalak()" aria-label="Itxi">×</button></div><p><strong>Ikaslea:</strong> <span id="jokIkaslea"></span><br/><strong>Data:</strong> <span id="jokData"></span></p><label>Portaera arrazoia<select id="portaeraArrazoia"></select></label><label>Neurri zuzentzailea<select id="neurriZuzentzailea"></select></label><label>Deskribapen zehatza<textarea id="deskribapenZehatza" rows="7" maxlength="10000" placeholder="Eguna, lekua, gertatutakoa..."></textarea></label><div id="jokErrorea" class="alert alert-error" style="display:none"></div><div class="ie-ekintzak"><button type="button" class="btn btn-secondary" onclick="irekiOharPopupBerriro()">Atzera</button><button id="jokabideGordeBtn" type="button" class="btn btn-primary" onclick="gordeJokabidea()">Sortu eta PDFa prestatu</button></div></div></div>
<script th:src="@{/js/ikasle-egun-modalak.js}"></script>
</div></body></html>
