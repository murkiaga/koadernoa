<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org" lang="eu"><body>
<div th:fragment="modalak">
<style>.ie-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:3000;align-items:center;justify-content:center}.ie-modal.open{display:flex}.ie-kutxa{background:#fff;border-radius:12px;padding:20px;width:min(560px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.25)}.ie-kutxa.handia{width:min(780px,94vw)}.ie-kutxa textarea,.ie-kutxa select{width:100%;box-sizing:border-box;margin:6px 0 14px;padding:8px}.ie-goiburua{display:flex;justify-content:space-between;gap:12px}.ie-ekintzak{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}.ikasle-egun-gelaxka{cursor:pointer}.ie-ikonoak{font-size:.82rem;white-space:nowrap}</style>
<div id="oharModal" class="ie-modal"><div class="ie-kutxa"><div class="ie-goiburua"><h3>Eguneko oharra</h3><button type="button" onclick="itxiIkasleEgunModalak()">×</button></div><p><strong id="oharIkaslea"></strong> · <span id="oharData"></span></p><textarea id="oharTestua" rows="6" maxlength="5000" placeholder="Idatzi egun horretako oharra..."></textarea><div id="oharErrorea" class="alert alert-error" style="display:none"></div><div class="ie-ekintzak"><button type="button" class="btn btn-secondary" onclick="irekiJokabideModal()">Jokabide desegokia sortu</button><button type="button" class="btn btn-secondary" onclick="ezabatuOharra()">Ezabatu</button><button type="button" class="btn btn-primary" onclick="gordeOharra()">Gorde</button></div></div></div>
<div id="jokabideModal" class="ie-modal"><div class="ie-kutxa handia"><div class="ie-goiburua"><h3>Jokabide desegokiagatiko idatzizko ohartarazpena</h3><button type="button" onclick="itxiIkasleEgunModalak()">×</button></div><p><strong>Ikaslea:</strong> <span id="jokIkaslea"></span><br/><strong>Data:</strong> <span id="jokData"></span></p><label>Portaera arrazoia<select id="portaeraArrazoia"></select></label><label>Neurri zuzentzailea<select id="neurriZuzentzailea"></select></label><label>Deskribapen zehatza<textarea id="deskribapenZehatza" rows="7" maxlength="10000" placeholder="Eguna, lekua, gertatutakoa..."></textarea></label><div id="jokErrorea" class="alert alert-error" style="display:none"></div><div class="ie-ekintzak"><button type="button" class="btn btn-secondary" onclick="irekiOharModalBerriro()">Atzera</button><button type="button" class="btn btn-primary" onclick="sortuJokabidea()">Sortu eta PDFa prestatu</button></div></div></div>
<script th:src="@{/js/ikasle-egun-modalak.js}"></script>
</div></body></html>
